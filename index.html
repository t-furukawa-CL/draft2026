<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドラフト2026 - 入力パネル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="players.js"></script>
    <style>
        .edit-panel { max-height: 800px; overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body class="p-4 bg-gray-100 font-sans">
    <div class="flex justify-between items-center mb-4 border-b pb-2">
        <h1 class="text-xl font-bold text-gray-700" id="page-title">ドラフト入力パネル</h1>
        <div class="space-x-2">
            <a href="sheet.html" target="_blank" class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">表示シートを開く</a>
            <button onclick="clearTeamData()" id="reset-btn" class="bg-red-100 text-red-600 px-3 py-1 rounded text-sm hover:bg-red-200">全リセット</button>
        </div>
    </div>

    <div id="form-container" class="grid grid-cols-1 md:grid-cols-5 gap-4"></div>

    <script>
        const ADMIN_PASSWORD_HASH = '6b2e2f8d1e8c5a1f3c6b8a9e0d1f4c5a';
        
        // SHA-256 ハッシュ関数
        async function sha256(message) {
            const msgUint8 = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }
        
        function checkAdminAuth() {
            // sessionStorage でアクティブなセッションをチェック
            if (sessionStorage.getItem('adminAuth') !== 'verified') {
                const password = prompt('このページは管理者のみアクセス可能です。\nパスワードを入力してください：');
                if (password === null) {
                    // キャンセルが押された場合
                    window.location.href = 'sheet.html';
                    return false;
                }
                
                // 入力されたパスワードをハッシュ化して検証（非同期処理）
                sha256(password).then(hash => {
                    if (hash !== ADMIN_PASSWORD_HASH) {
                        alert('パスワードが正しくありません');
                        window.location.href = 'sheet.html';
                    } else {
                        sessionStorage.setItem('adminAuth', 'verified');
                        // ページをリロード して以下のスクリプトを実行
                        location.reload();
                    }
                });
                return false;
            }
            return true;
        }
        
        // ページロード時に認証確認（同期的に実行）
        if (sessionStorage.getItem('adminAuth') !== 'verified') {
            // 非同期認証処理を開始
            (async function() {
                const password = prompt('このページは管理者のみアクセス可能です。\nパスワードを入力してください：');
                if (password === null) {
                    window.location.href = 'sheet.html';
                    return;
                }
                const hash = await sha256(password);
                if (hash !== ADMIN_PASSWORD_HASH) {
                    alert('パスワードが正しくありません');
                    window.location.href = 'sheet.html';
                } else {
                    sessionStorage.setItem('adminAuth', 'verified');
                }
            })();
            throw new Error('Admin authentication required');
        }
        
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzPQR4A22pPOAwojXCCWWNnoWvucQghtyviPvidWkbTRST5VY2klAA9griSHU74oIoX/exec";
        const owners = ['蛯澤', '小菅', '濱野', '古川', '安川'];
        const countries = [{ name: '日本', flag: '🇯🇵' }, { name: '台湾', flag: '🇹🇼' }, { name: '豪州', flag: '🇦🇺' }, { name: '韓国', flag: '🇰🇷' }, { name: 'チェコ', flag: '🇨🇿' }];
        
        // URLパラメータからアクセス許可チームを取得
        const params = new URLSearchParams(window.location.search);
        const allowedTeam = params.get('team');
        
        const infoFields = [
            { id: 'teamName', label: 'チーム名' },
            { id: 'owner', label: 'オーナー', type: 'select', options: owners },
            { id: 'manager', label: '監督' },
            { id: 'p-coach', label: '投手コーチ' },
            { id: '1b-coach', label: '1塁コーチ' },
            { id: '3b-coach', label: '3塁コーチ' }
        ];

        function initLayout() {
            const formContainer = document.getElementById('form-container');
            const teamList = [...new Set(allPlayers.map(p => p.c))];
            
            // ページタイトルを更新
            const pageTitle = document.getElementById('page-title');
            if (allowedTeam) {
                pageTitle.innerText = `TEAM ${allowedTeam} 編集パネル`;
                // チーム毎編集時は全リセットボタンを非表示
                document.getElementById('reset-btn').style.display = 'none';
            }

            for (let i = 1; i <= 5; i++) {
                // allowedTeam が指定されていて、現在のチーム番号と異なる場合はスキップ
                if (allowedTeam && parseInt(allowedTeam) !== i) {
                    continue;
                }
                
                let fieldsHtml = infoFields.map(f => {
                    if (f.type === 'select') {
                        return `<label class="block text-gray-400 mt-1">${f.label}</label>
                                <select id="in-${f.id}-${i}" onchange="saveAll()" class="w-full border rounded p-1 bg-white">
                                    ${f.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                </select>`;
                    }
                    return `<label class="block text-gray-400 mt-1">${f.label}</label>
                            <input type="text" id="in-${f.id}-${i}" oninput="saveAll()" class="w-full border rounded p-1" placeholder="${f.label}">`;
                }).join('');

                formContainer.insertAdjacentHTML('beforeend', `
                    <div class="bg-white p-3 rounded shadow border border-gray-200 text-xs">
                        <h3 class="font-bold mb-2 text-blue-800 border-b italic">TEAM ${i}</h3>
                        <div class="edit-panel space-y-1">
                            <label class="block text-gray-400 font-bold">国</label>
                            <select id="in-country-${i}" onchange="saveAll()" class="w-full border rounded p-1">
                                ${countries.map(c => `<option value="${c.flag}">${c.flag} ${c.name}</option>`).join('')}
                            </select>
                            ${fieldsHtml}
                            <div class="mt-2 p-2 bg-yellow-50 border border-yellow-200 rounded">
                                <span class="text-gray-500 font-bold">総年俸: </span>
                                <span id="total-price-${i}" class="text-blue-700 font-bold text-sm">0</span> <span class="text-[8px]">万</span>
                            </div>
                            <label class="block text-gray-400 font-bold mt-4 border-t pt-2 italic">DRAFT SELECT</label>
                            <div id="player-selects-${i}" class="space-y-1"></div>
                        </div>
                    </div>`);
                
                const selectContainer = document.getElementById(`player-selects-${i}`);
                for(let r=1; r<=24; r++) {
                    selectContainer.insertAdjacentHTML('beforeend', `
                        <div class="flex items-center gap-1">
                            <span class="text-[9px] w-4 text-gray-400">${r}</span>
                            <select id="in-round-${r}-team-${i}-club" onchange="updatePlayerOptions(${r}, ${i})" class="w-14 border rounded p-0.5 text-[9px] bg-blue-50">
                                <option value="">球団</option>
                                ${teamList.map(t => `<option value="${t}">${t}</option>`).join('')}
                            </select>
                            <select id="in-round-${r}-team-${i}" onchange="saveAll()" class="w-full border rounded p-0.5 text-[10px]">
                                <option value="">---</option>
                            </select>
                        </div>`);
                }
            }
        }

        // suppressSave: true にすると内部で saveAll を呼ばない（ロード時に使用）
        function updatePlayerOptions(r, i, savedValue = null, suppressSave = false) {
            const clubEl = document.getElementById(`in-round-${r}-team-${i}-club`);
            const playerEl = document.getElementById(`in-round-${r}-team-${i}`);
            const selectedClub = clubEl.value;
            let optionsHtml = '<option value="">---</option>';
            if (selectedClub) {
                const filtered = allPlayers.filter(p => p.c === selectedClub);
                optionsHtml += filtered.map(p => `<option value="${p.n}|${p.p}">${p.n} (${p.p})</option>`).join('');
            }
            playerEl.innerHTML = optionsHtml;
            if (savedValue) playerEl.value = savedValue;
            if (!suppressSave) saveAll();
        }

        async function saveAll() {
            // ローカルストレージから既存データを取得
            const saved = localStorage.getItem('draftApp_full_save');
            const state = saved ? JSON.parse(saved) : {};
            
            // allowedTeam が指定されている場合は、そのチームのみを更新
            const teamsToUpdate = allowedTeam ? [parseInt(allowedTeam)] : [1, 2, 3, 4, 5];
            
            for (let i of teamsToUpdate) {
                // フォーム要素が存在しない場合はスキップ（別のページから編集されている可能性）
                const countryEl = document.getElementById(`in-country-${i}`);
                if (!countryEl) continue;
                
                let teamTotal = 0;
                state[i] = { country: countryEl.value, players: {}, clubs: {} };
                infoFields.forEach(f => { 
                    const el = document.getElementById(`in-${f.id}-${i}`);
                    if (el) state[i][f.id] = el.value;
                });

                for(let r=1; r<=24; r++) {
                    const clubEl = document.getElementById(`in-round-${r}-team-${i}-club`);
                    const playerEl = document.getElementById(`in-round-${r}-team-${i}`);
                    if (!clubEl || !playerEl) continue;
                    
                    const clubVal = clubEl.value;
                    const val = playerEl.value;
                    state[i].clubs[r] = clubVal;
                    state[i].players[r] = val;
                    if(val) {
                        const price = parseInt(val.split('|')[1].replace(/,/g, ''));
                        teamTotal += price;
                    }
                }
                const totalPriceEl = document.getElementById(`total-price-${i}`);
                if (totalPriceEl) totalPriceEl.innerText = teamTotal.toLocaleString();
                state[i].totalPrice = teamTotal;
            }

            // ローカル保存
            localStorage.setItem('draftApp_full_save', JSON.stringify(state));

            // GAS経由でスプレッドシートへ保存
            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(state),
                mode: "no-cors" // GASの仕様上、レスポンスを受け取らない設定が安定します
            });
        }


        async function loadSavedData() {
            try {
                const res = await fetch(GAS_URL);
                const state = await res.json();
                if (state && state[1]) {
                    // allowedTeam が指定されている場合は、そのチームのみを読み込む
                    const teamsToLoad = allowedTeam ? [parseInt(allowedTeam)] : [1, 2, 3, 4, 5];
                    
                    for (let i of teamsToLoad) {
                        const countryEl = document.getElementById(`in-country-${i}`);
                        if (!countryEl) continue; // フォームが存在しない場合はスキップ
                        
                        countryEl.value = state[i]?.country || '';
                        infoFields.forEach(f => {
                            const el = document.getElementById(`in-${f.id}-${i}`);
                            if (el) el.value = state[i]?.[f.id] || '';
                        });
                        for(let r=1; r<=24; r++) {
                            const clubEl = document.getElementById(`in-round-${r}-team-${i}-club`);
                            if (!clubEl) continue;
                            clubEl.value = state[i]?.clubs?.[r] || "";
                            // ロード時は saveAll を呼ばない
                            updatePlayerOptions(r, i, state[i]?.players?.[r], true);
                        }
                    }
                }
            } catch (e) { console.log("サーバーデータなし、ローカルを使用します"); }
        }

        function clearTeamData() {
            if (allowedTeam) {
                if (confirm(`TEAM ${allowedTeam} のデータをリセットしますか？`)) {
                    const saved = localStorage.getItem('draftApp_full_save');
                    if (saved) {
                        const state = JSON.parse(saved);
                        delete state[allowedTeam];
                        localStorage.setItem('draftApp_full_save', JSON.stringify(state));
                    }
                    location.reload();
                }
            } else {
                if (confirm("全データをリセットしますか？")) {
                    localStorage.clear();
                    location.reload();
                }
            }
        }

        initLayout();
        loadSavedData();
    </script>
</body>
</html>
