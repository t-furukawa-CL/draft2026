<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ドラフト対象選手一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="players.js"></script>
</head>
<body class="p-4 bg-gray-100 font-sans">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b pb-4 bg-white p-4 rounded shadow-sm">
            <h1 class="text-xl font-bold text-gray-700">ドラフト対象選手一覧</h1>
            <div class="flex gap-2 items-center">
                <label class="flex items-center gap-1 text-xs bg-gray-200 px-2 py-1 rounded cursor-pointer hover:bg-gray-300">
                    <input type="checkbox" id="mask-high-salary" onchange="renderPlayerList()" class="w-3 h-3" checked>
                    <span class="text-gray-600">1億越え選手を非表示にする</span>
                </label>
                <label class="flex items-center gap-1 text-xs bg-gray-200 px-2 py-1 rounded cursor-pointer hover:bg-gray-300">
                    <input type="checkbox" id="sort-salary" onchange="renderPlayerList()" class="w-3 h-3" checked>
                    <span class="text-gray-600">年俸順にソートする</span>
                </label>
                <select id="club-filter" onchange="renderPlayerList()" class="border rounded p-1 text-sm bg-white">
                    <option value="all">全ての球団</option>
                </select>
            </div>
        </div>

        <div id="list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            </div>
    </div>

    <script>
        // players.js から球団リストを抽出してプルダウンを生成
        function initClubFilter() {
            const clubFilter = document.getElementById('club-filter');
            const clubs = [...new Set(allPlayers.map(p => p.c))];
            clubs.forEach(club => {
                const opt = document.createElement('option');
                opt.value = club;
                opt.textContent = club;
                clubFilter.appendChild(opt);
            });
        }

        function renderPlayerList() {
            const container = document.getElementById('list-container');
            const selectedClub = document.getElementById('club-filter').value;
            const isLimitEnabled = document.getElementById('mask-high-salary').checked;
            const isSortEnabled = document.getElementById('sort-salary').checked;

            container.innerHTML = '';

            // 1. フィルタリング
            let displayPlayers = allPlayers.filter(p => {
                const matchClub = (selectedClub === 'all' || p.c === selectedClub);
                const price = parseInt(p.p.replace(/,/g, ''));
                const matchLimit = isLimitEnabled ? price < 10000 : true;
                return matchClub && matchLimit;
            });

            // 2. ソート
            if (isSortEnabled) {
                displayPlayers.sort((a, b) => {
                    const priceA = parseInt(a.p.replace(/,/g, ''));
                    const priceB = parseInt(b.p.replace(/,/g, ''));
                    return priceB - priceA;
                });
            }

            // 3. 描画
            displayPlayers.forEach(p => {
                const saved = localStorage.getItem('draftApp_full_save');
                const state = saved ? JSON.parse(saved) : {};
                const playerValue = `${p.n}|${p.p}`;
                let label = "";

                // ★チームの国旗ユニフォームに連動したカラー定義
                const teamPowerColors = {
                    1: '#005642', 
                    2: '#9400d3', 
                    3: '#00008b',
                    4: '#b22222', 
                    5: '#ffd700' 
                };

                for (let i = 1; i <= 5; i++) {
                    const teamPlayers = state[i]?.players || {};
                    if (Object.values(teamPlayers).includes(playerValue)) {
                        const ownerName = state[i]?.owner || `TEAM ${i}`;
                        
                        const labelColor = teamPowerColors[i];
                        
                        label = `<span class="font-bold text-[13px] ml-2" style="color: ${labelColor}; border-bottom: 1px solid ${labelColor}44;">[${ownerName} 交渉権獲得]</span>`;
                        break;
                    }
                }

                const card = `
                    <div class="bg-white p-3 rounded shadow border-l-4 border-blue-800 flex justify-between items-center">
                        <div>
                            <div class="text-[10px] text-gray-500">${p.c}</div>
                            <div class="font-bold text-gray-800">${p.n}${label}</div>
                        </div>
                        <div class="text-blue-600 font-mono font-bold">
                            ${parseInt(p.p.replace(/,/g, '')).toLocaleString()}<span class="text-[10px] ml-0.5">万</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
            if (displayPlayers.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10">該当する選手がいません</p>';
            }
        }


        function getDraftStatusLabel(playerName, salary) {
            const saved = localStorage.getItem('draftApp_full_save');
            if (!saved) return "";
            
            const state = JSON.parse(saved);
            const playerValue = `${playerName}|${salary}`;

            // 全チーム(1〜5)の指名状況を確認
            for (let i = 1; i <= 5; i++) {
                const teamPlayers = state[i]?.players || {};
                const isTaken = Object.values(teamPlayers).includes(playerValue);

                if (isTaken) {
                    const teamName = state[i]?.teamName || `TEAM ${i}`;
                    // 赤字のラベルを返す
                    return `<span style="color: red; font-weight: bold; margin-left: 8px;">[${teamName} 交渉権獲得]</span>`;
                }
            }
            return ""; // 誰も獲得していなければ空
        }

        // 初期化実行
        initClubFilter();
        renderPlayerList();
    </script>
</body>
</html>
