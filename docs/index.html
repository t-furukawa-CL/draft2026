<!DOCTYPE html>
<html lang="ja">
<head>

    <title>ドラフトアプリへようこそ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; color: #374151; }
        .container { max-width: 600px; margin: 5rem auto; padding: 2rem; background: #ffffff; border-radius: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        a.button { display: inline-block; margin-top: 1.5rem; padding: 0.75rem 1.25rem; background:#3b82f6; color:#fff; border-radius:.375rem; text-decoration:none; }

    <div class="container">
        <h1 class="text-2xl font-bold mb-4">ドラフト2026 編集アプリ</h1>

        <ul class="list-disc list-inside mt-3">
            <li>チーム別の編集パネル</li>
            <li>年俸の自動計算</li>
